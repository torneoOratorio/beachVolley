<style>

body{font-family:'Trebuchet MS',Tahoma,sans-serif;background:linear-gradient(160deg,#b5651d 0%,#d4a04a 25%,#e8c97a 45%,#c19a50 65%,#8b4513 100%);min-height:100vh;color:#fff;}

.tab-btn.inactive{background:rgba(0,0,0,0.45);border-color:rgba(255,255,255,0.2);color:#fff;}

.inp{background:rgba(0,0,0,0.58);border:2px solid rgba(255,200,100,0.45);border-radius:8px;color:#fff;font-size:13px;padding:8px 10px;outline:none;width:100%;}
.score-inp{width:46px;text-align:center;background:rgba(0,0,0,0.68);border:2px solid rgba(255,200,100,0.45);border-radius:8px;color:#fff;font-size:22px;font-weight:900;padding:5px 0;outline:none;}
.btn-gold{background:#ffe066;border:none;border-radius:8px;color:#333;font-weight:800;cursor:pointer;}
.btn-red{background:rgba(255,80,80,0.3);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;}
.bar-fill{transition:width .6s cubic-bezier(.4,0,.2,1);}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════
   ⚙️ CONFIGURAZIONE ADMIN
   Cambia il PIN qui sotto con quello che vuoi tu (solo numeri o
   lettere, niente spazi). Chi conosce questo PIN potrà impostare
   le quote, le puntate, gli orari, randomizzare e bloccare.
═══════════════════════════════════════════════════════════════ */
var ADMIN_PIN = "volley2026";

/* ═══ DATA INIZIALE ═════════════════════════════════════════════ */
var INIT_TEAMS = [
  {id:1,name:"I di...Sperati",           logo:"",color:"#e74c3c",members:["Casagrande Lorenza","Paterno Ivo","Purin Silvia","Paterno Mara"]},
  {id:2,name:"Monzarella",               logo:"",color:"#f39c12",members:["Lorenzo Rigo","Simone Sittoni Wassermann","Giacomo Gaiardo","Davide Ballin"]},
  {id:3,name:"Cretino Basket",           logo:"",color:"#2ecc71",members:["TBD","TBD","TBD","TBD"]},
  {id:4,name:"Associazione a Delinquere",logo:"",color:"#a855f7",members:["TBD","TBD","TBD","TBD"]},
  {id:5,name:"New York Knicks",          logo:"",color:"#38bdf8",members:["Luca Gasperetti","TBD","TBD","TBD"]},
  {id:6,name:"Super Chicche",            logo:"",color:"#f472b6",members:["Alessandra Konecni","Chiara Volpe","Angelica Moser","Anna Martinelli","Kati Stefani","Elisa Franzinelli"]},
];

/* ═══ STATE ═════════════════════════════════════════════════════ */
var teams       = [];
var matches     = [];
var odds        = {1:'',2:'',3:'',4:'',5:'',6:''};
var bets        = {1:'',2:'',3:'',4:'',5:'',6:''};
var startTime   = '18:00';   // orario prima partita
var gapMin      = 20;        // minuti tra l'inizio di un match e il successivo
var locked      = false;     // calendario bloccato (no randomize)
var isLoaded    = false;

var isAdmin     = (localStorage.getItem('bv_admin') === '1'); // admin per dispositivo

var tab         = 'cal';
var openMatch   = null;
var openTeam    = null;
var editLogo    = null;
var logoInput   = '';
var editMember  = null;
var memberInput = '';
var docRef      = null;

/* ═══ CONFIGURAZIONE E SINCRONIZZAZIONE FIREBASE ════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyBvnnfJCMq5uEjMA7VoFuxV7m63xA3-fEA",
  authDomain: "inviaggiocongiovanni.firebaseapp.com",
  databaseURL: "https://inviaggiocongiovanni-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "inviaggiocongiovanni",
  storageBucket: "inviaggiocongiovanni.firebasestorage.app",
  messagingSenderId: "357273410261",
  appId: "1:357273410261:web:4382c0aa1528328d5da05c",
  measurementId: "G-MXP3N2JZ5F"
};

try {
  if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.firestore();
  docRef = db.collection("torneo").doc("stato_attuale");

  docRef.onSnapshot(function(doc) {
    if (doc.exists) {
      var data = doc.data();
      teams     = data.teams   || [];
      matches   = data.matches || [];
      odds      = data.odds    || {1:'',2:'',3:'',4:'',5:'',6:''};
      bets      = data.bets    || {1:'',2:'',3:'',4:'',5:'',6:''};
      startTime = data.startTime || '18:00';
      gapMin    = (data.gapMin != null) ? data.gapMin : 20;
      locked    = data.locked  || false;
      isLoaded  = true;
      render();
    } else {
      teams     = JSON.parse(JSON.stringify(INIT_TEAMS));
      matches   = genMatches(teams);
      odds      = {1:'',2:'',3:'',4:'',5:'',6:''};
      bets      = {1:'',2:'',3:'',4:'',5:'',6:''};
      startTime = '18:00';
      gapMin    = 20;
      locked    = false;
      isLoaded  = true;
      saveToDB();
    }
  }, function(error) {
    document.getElementById('app').innerHTML = '<div style="text-align:center;padding:80px 20px;"><div style="font-size:40px;margin-bottom:10px;">⚠️</div><div style="font-size:18px;font-weight:900;color:#ff6b6b;margin-bottom:10px;">Errore Firebase</div><div style="font-size:13px;color:rgba(255,255,255,0.7);line-height:1.5;">' + error.message + '</div></div>';
  });

} catch (error) {
  window.onload = function() {
      document.getElementById('app').innerHTML = '<div style="text-align:center;padding:80px 20px;"><div style="font-size:40px;margin-bottom:10px;">⚠️</div><div style="font-size:18px;font-weight:900;color:#ff6b6b;">Errore Critico Inizializzazione:</div><div style="font-size:13px;color:rgba(255,255,255,0.7);">' + error.message + '</div></div>';
  };
}

function saveToDB() {
  if(!docRef) return;
  docRef.set({
    teams: teams,
    matches: matches,
    odds: odds,
    bets: bets,
    startTime: startTime,
    gapMin: gapMin,
    locked: locked
  }, { merge: true });
}

/* ═══ HELPERS ═══════════════════════════════════════════════════ */
function genMatches(ts){
  var out=[],id=1;
  for(var i=0;i<ts.length;i++)
    for(var j=i+1;j<ts.length;j++)
      out.push({id:id++,home:ts[i].id,away:ts[j].id,s1h:'',s1a:'',s2h:'',s2a:'',played:false});
  return out;
}
function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function matchResult(m){
  var s1h=+m.s1h,s1a=+m.s1a,s2h=+m.s2h,s2a=+m.s2a;
  if([s1h,s1a,s2h,s2a].some(isNaN))return null;
  return{sH:(s1h>s1a?1:0)+(s2h>s2a?1:0),sA:(s1a>s1h?1:0)+(s2a>s2h?1:0)};
}
function standings(){
  var st={};
  teams.forEach(function(t){st[t.id]={id:t.id,G:0,V:0,P:0,SV:0,SP:0,Pts:0};});
  matches.forEach(function(m){
    if(!m.played)return;
    var r=matchResult(m);if(!r)return;
    st[m.home].G++;st[m.away].G++;
    st[m.home].SV+=r.sH;st[m.home].SP+=r.sA;
    st[m.away].SV+=r.sA;st[m.away].SP+=r.sH;
    if(r.sH>r.sA){st[m.home].V++;st[m.home].Pts+=3;st[m.away].P++;st[m.away].Pts+=1;}
    else if(r.sA>r.sH){st[m.away].V++;st[m.away].Pts+=3;st[m.home].P++;st[m.home].Pts+=1;}
    else{st[m.home].Pts+=2;st[m.away].Pts+=2;}
  });
  return Object.values(st).sort(function(a,b){return(b.Pts-a.Pts)||((b.SV-b.SP)-(a.SV-a.SP));});
}
function getTeam(id){return teams.find(function(t){return t.id===id;});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── orari ── */
function parseHHMM(s){
  var p=String(s).split(':');
  var h=parseInt(p[0],10)||0;
  var m=parseInt(p[1],10)||0;
  return h*60+m;
}
function minToHHMM(tot){
  tot=((tot%1440)+1440)%1440;
  var h=Math.floor(tot/60), m=tot%60;
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}
/* orario di inizio del match in posizione idx (0-based, ordine attuale) */
function matchTime(idx){ return minToHHMM(parseHHMM(startTime)+idx*gapMin); }

function logoEl(team,size){
  var init=team.name.charAt(0).toUpperCase();
  var fb='width:'+size+'px;height:'+size+'px;border-radius:50%;flex-shrink:0;background:'+team.color+'33;border:2px solid '+team.color+';display:inline-flex;align-items:center;justify-content:center;font-size:'+Math.round(size*.38)+'px;color:'+team.color+';font-weight:900;vertical-align:middle;';
  if(!team.logo)return '<div style="'+fb+'">'+init+'</div>';
  return '<img src="'+esc(team.logo)+'" alt="" data-tl="'+team.id+'" data-sz="'+size+'" style="width:'+size+'px;height:'+size+'px;border-radius:50%;object-fit:cover;border:2px solid '+team.color+';flex-shrink:0;vertical-align:middle;">';
}

/* ═══ ADMIN ═════════════════════════════════════════════════════ */
function toggleAdmin(){
  if(isAdmin){
    isAdmin=false;
    localStorage.removeItem('bv_admin');
    render();
  } else {
    var pin=prompt('🔒 Inserisci il PIN admin:');
    if(pin===null) return;
    if(pin===ADMIN_PIN){
      isAdmin=true;
      localStorage.setItem('bv_admin','1');
      render();
    } else {
      alert('❌ PIN errato');
    }
  }
}

/* ═══ RENDER ════════════════════════════════════════════════════ */
function render(){
  if(!isLoaded){
    document.getElementById('app').innerHTML='<div style="text-align:center;padding:80px 20px;font-size:18px;font-weight:800;color:#ffe066;">⏳ Connessione al server in corso...</div>';
    return;
  }

  var played=matches.filter(function(m){return m.played;}).length;
  var pct=(played/matches.length*100).toFixed(0);

  var html='';

  /* HEADER */
  html+='<div style="position:relative;background:linear-gradient(180deg,rgba(0,70,150,0.96),rgba(0,110,210,0.84));padding:22px 20px 18px;text-align:center;border-bottom:4px solid rgba(255,220,80,.6);box-shadow:0 4px 30px rgba(0,0,0,.45);">';
  html+='<button onclick="toggleAdmin()" title="Modalità admin" style="position:absolute;top:10px;right:10px;z-index:5;background:'+(isAdmin?'rgba(110,255,154,.22)':'rgba(0,0,0,.4)')+';border:1.5px solid '+(isAdmin?'#6eff9a':'rgba(255,255,255,.28)')+';border-radius:20px;color:'+(isAdmin?'#6eff9a':'#fff')+';font-size:11px;font-weight:800;padding:5px 11px;cursor:pointer;">'+(isAdmin?'🔓 Admin':'🔒')+'</button>';
  html+='<div style="font-size:11px;letter-spacing:5px;color:#ffe066;text-transform:uppercase;">🏖️ Torneo Oratorio</div>';
  html+='<div style="font-size:26px;font-weight:900;letter-spacing:1px;">BEACH VOLLEY 🏐</div>';
  html+='<div style="font-size:12px;color:#ffe066;font-style:italic;margin-top:2px;">Girone All\'Italiana · 6 Squadre · 15 Partite</div>';
  html+='<div style="max-width:280px;margin:12px auto 0;">';
  html+='<div style="display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.6);margin-bottom:4px;"><span>'+played+' giocate</span><span>'+(matches.length-played)+' rimaste</span></div>';
  html+='<div style="height:6px;background:rgba(255,255,255,.15);border-radius:3px;"><div class="bar-fill" style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#ffe066,#ff9500);border-radius:3px;"></div></div>';
  html+='</div></div>';

  /* FORMAT STRIP */
  html+='<div style="background:rgba(0,0,0,.55);padding:8px 16px;display:flex;justify-content:center;gap:18px;font-size:12px;flex-wrap:wrap;">';
  [['⏱️ Set 1','7 min'],['🔄 Cambio campo','~1 min'],['⏱️ Set 2','7 min'],['📋 Slot match','20 min']].forEach(function(p){
    html+='<div style="text-align:center;"><div style="color:#ffe066;font-weight:700;">'+p[0]+'</div><div style="color:rgba(255,255,255,.7);">'+p[1]+'</div></div>';
  });
  html+='</div>';

  /* TABS */
  html+='<div style="display:flex;justify-content:center;gap:6px;padding:12px 12px 0;flex-wrap:wrap;">';
  [['cal','📅 Partite'],['cls','🏆 Classifica'],['sqd','👥 Squadre'],['bet','🍟 Scommesse']].forEach(function(p){
    html+='<button class="tab-btn '+(tab===p[0]?'active':'inactive')+'" onclick="setTab(\''+p[0]+'\')">'+p[1]+'</button>';
  });
  html+='</div>';

  /* CONTENT */
  html+='<div style="max-width:640px;margin:0 auto;padding:14px 12px 60px;">';
  if(tab==='cal') html+=buildCal();
  if(tab==='cls') html+=buildCls();
  if(tab==='sqd') html+=buildSqd();
  if(tab==='bet') html+=buildBet();
  html+='</div>';

  document.getElementById('app').innerHTML=html;
  afterRender();
}

/* ── CALENDARIO ── */
function buildCal(){
  var h='';

  /* riga riassunto orari + stato lock (visibile a tutti) */
  h+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;">';
  h+='<span style="font-size:12px;color:rgba(255,255,255,.6);">🕐 Inizio <b style="color:#9ad8ff;">'+matchTime(0)+'</b> · Ultimo match <b style="color:#9ad8ff;">'+matchTime(matches.length-1)+'</b></span>';
  if(locked) h+='<span style="font-size:11px;font-weight:800;color:#6eff9a;background:rgba(110,255,154,.16);border:1px solid rgba(110,255,154,.4);border-radius:14px;padding:4px 10px;">🔒 Calendario bloccato</span>';
  h+='</div>';

  /* pannello controlli ADMIN */
  if(isAdmin){
    h+='<div class="card" style="padding:13px 14px;margin-bottom:14px;border-color:rgba(110,255,154,.4);">';
    h+='<div style="font-size:11px;color:#6eff9a;font-weight:800;margin-bottom:11px;">🔧 Controlli Admin</div>';

    h+='<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:13px;">';
    h+='<div><div style="font-size:10px;color:rgba(255,255,255,.5);font-weight:700;margin-bottom:4px;text-transform:uppercase;">🕐 Orario inizio</div>';
    h+='<input type="time" value="'+esc(startTime)+'" data-cfg="startTime" class="inp" style="width:130px;"></div>';

    h+='<input type="number" min="1" value="'+esc(gapMin)+'" data-cfg="gapMin" class="inp" style="width:90px;"></div>';
    h+='</div>';

    h+='<div style="display:flex;gap:10px;flex-wrap:wrap;">';
    if(locked){
      h+='<button disabled style="flex:1;min-width:150px;padding:11px;background:rgba(255,255,255,.07);border:none;border-radius:10px;color:rgba(255,255,255,.4);font-weight:800;font-size:12px;cursor:not-allowed;">🔀 Randomizza (bloccato)</button>';
    } else {
      h+='<button onclick="doRandomize()" style="flex:1;min-width:150px;padding:11px;background:linear-gradient(135deg,#ffe066,#ff9500);border:none;border-radius:10px;color:#333;font-weight:800;font-size:12px;cursor:pointer;">🔀 Randomizza</button>';
    }
    h+='<div id="lockBtn" style="flex:1;min-width:170px;position:relative;overflow:hidden;padding:9px;border-radius:10px;border:2px solid '+(locked?'#6eff9a':'rgba(255,200,100,.5)')+';background:rgba(0,0,0,.45);color:'+(locked?'#6eff9a':'#ffe066')+';font-weight:800;font-size:12px;text-align:center;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;line-height:1.25;">';
    h+='<div id="lockFill" style="position:absolute;top:0;left:0;height:100%;width:0;background:rgba(255,220,80,.35);pointer-events:none;"></div>';
    h+='<span style="position:relative;pointer-events:none;">'+(locked?'🔒 BLOCCATO':'🔓 APERTO')+'<br><span style="font-size:9px;opacity:.85;font-weight:600;">tieni premuto per '+(locked?'sbloccare':'bloccare')+'</span></span>';
    h+='</div>';
    h+='</div>';

    h+='</div>';
  } else {
    h+='<div style="font-size:12px;color:rgba(255,255,255,.45);margin-bottom:12px;">Tocca un match per inserire i punti</div>';
  }

  matches.forEach(function(m,idx){
    var home=getTeam(m.home),away=getTeam(m.away);
    if(!home||!away)return;
    var r=m.played?matchResult(m):null;
    var isOpen=openMatch===m.id;

    var scoreHtml=r
      ?'<span style="background:'+(r.sH>r.sA?'rgba(80,200,100,.32)':'rgba(255,80,80,.22)')+';border-radius:6px;padding:3px 10px;font-weight:900;color:'+(r.sH>r.sA?'#6eff9a':'#ff8080')+';font-size:18px;">'+r.sH+'</span>'
       +'<span style="color:rgba(255,255,255,.25);font-weight:900;padding:0 3px;">-</span>'

      :'<span style="color:rgba(255,255,255,.18);font-size:16px;padding:0 6px;">🆚</span>';

    h+='<div id="mc'+m.id+'" class="card" style="margin-bottom:9px;overflow:hidden;border-color:'+(m.played?'rgba(100,255,150,.55)':'rgba(255,200,100,.28)')+';">';

    h+='<span style="background:rgba(255,220,80,.18);color:#ffe066;border-radius:6px;padding:2px 6px;font-size:10px;font-weight:800;flex-shrink:0;">#'+(idx+1)+'</span>';
    h+='<span style="background:rgba(0,150,255,.22);color:#9ad8ff;border-radius:6px;padding:2px 6px;font-size:10px;font-weight:800;flex-shrink:0;">🕐'+matchTime(idx)+'</span>';
    h+='<div style="flex:1;display:flex;align-items:center;gap:6px;justify-content:flex-end;min-width:0;">';
    h+='<span style="font-size:12px;font-weight:800;color:'+home.color+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(home.name)+'</span>'+logoEl(home,30);
    h+='</div><div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">'+scoreHtml+'</div>';

    if(isOpen){

      var resText=r?(r.sH===r.sA?'🤝 Pareggio 1-1':'🏐 Vince '+(r.sH>r.sA?home.name:away.name)+'!'):'';

      h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;">';
      [{l:'⏱️ Set 1 (7 min)',fh:'s1h',fa:'s1a'},{l:'🔄 Set 2 (7 min)',fh:'s2h',fa:'s2a'}].forEach(function(s){
        h+='<div style="background:rgba(0,0,0,.52);border-radius:10px;padding:10px 12px;">';
        h+='<div style="font-size:10px;color:#ffe066;font-weight:700;margin-bottom:8px;text-align:center;">'+s.l+'</div>';
        h+='<div style="display:flex;align-items:center;justify-content:center;gap:10px;">';
        h+='<div style="text-align:center;"><div style="font-size:9px;color:'+home.color+';margin-bottom:3px;font-weight:700;">'+esc(home.name.split(' ')[0])+'</div>';
        h+='<input class="score-inp" type="number" min="0" max="99" value="'+esc(m[s.fh])+'" data-mid="'+m.id+'" data-fld="'+s.fh+'"></div>';
        h+='<span style="color:rgba(255,255,255,.2);font-size:18px;">·</span>';
        h+='<div style="text-align:center;"><div style="font-size:9px;color:'+away.color+';margin-bottom:3px;font-weight:700;">'+esc(away.name.split(' ')[0])+'</div>';
        h+='<input class="score-inp" type="number" min="0" max="99" value="'+esc(m[s.fa])+'" data-mid="'+m.id+'" data-fld="'+s.fa+'"></div>';
        h+='</div></div>';
      });
      h+='</div>';
      h+='<div id="res'+m.id+'" style="margin-top:10px;text-align:center;font-size:13px;font-weight:800;color:'+resColor+';">'+resText+'</div>';

}

function buildChart(){
  var raw=teams.map(function(t){var q=parseFloat(odds[t.id]);return{t:t,p:q>0?1/q:0};});
  var total=raw.reduce(function(s,x){return s+x.p;},0);
  if(!total)return '<div style="text-align:center;color:rgba(255,255,255,.3);font-size:13px;padding:24px 0;">Quote non ancora impostate dall\'admin</div>';
  var rows=raw.map(function(x){return{t:x.t,pct:x.p/total*100};}).sort(function(a,b){return b.pct-a.pct;});
  var h='';
  rows.forEach(function(x){
    h+='<div style="margin-bottom:14px;">';
    h+='<div style="display:flex;align-items:center;gap:9px;margin-bottom:5px;">';
    h+=logoEl(x.t,26);
    h+='<span style="font-size:13px;font-weight:700;color:'+x.t.color+';flex:1;">'+esc(x.t.name)+'</span>';
    h+='<span style="font-size:15px;font-weight:900;color:#ffe066;min-width:52px;text-align:right;">'+x.pct.toFixed(1)+'%</span>';
    h+='</div>';
    h+='<div style="height:22px;background:rgba(0,0,0,.55);border-radius:11px;overflow:hidden;">';
    h+='<div class="bar-fill" style="height:100%;width:'+x.pct+'%;background:linear-gradient(90deg,'+x.t.color+'88,'+x.t.color+');border-radius:11px;box-shadow:0 0 10px '+x.t.color+'55;"></div>';
    h+='</div></div>';
  });
  return h;
}

function buildAnalysis(){
  var raw=teams.map(function(t){var q=parseFloat(odds[t.id]);return{t:t,p:q>0?1/q:0};});
  var total=raw.reduce(function(s,x){return s+x.p;},0);
  if(!total)return '';
  var sorted=raw.map(function(x){return{t:x.t,pct:x.p/total*100};}).sort(function(a,b){return b.pct-a.pct;});
  var fav=sorted[0],und=sorted[sorted.length-1];
  var margin=((total-1)*100).toFixed(1);
  var h='<div class="card" style="padding:14px 16px;">';
  h+='<div style="font-size:13px;font-weight:800;color:#ffe066;margin-bottom:10px;">🎯 Analisi Quote</div>';
  h+='<div style="display:grid;gap:8px;margin-bottom:12px;">';
  [['🏆 Favorita',fav.t.name,fav.t.color,fav.pct.toFixed(1)+'%'],
   ['😅 Outsider',und.t.name,und.t.color,und.pct.toFixed(1)+'%'],
   ['📈 Margine banco',margin+'%','#aaa','sovra-prob. totale'],
  ].forEach(function(row){
    h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(0,0,0,.42);border-radius:8px;">';
    h+='<span style="font-size:12px;color:rgba(255,255,255,.5);">'+row[0]+'</span>';
    h+='<span style="font-size:13px;font-weight:800;color:'+row[2]+';"><span style="color:#ffe066;">'+esc(row[1])+'</span> <span style="color:rgba(255,255,255,.55);font-size:11px;">('+row[3]+')</span></span>';
    h+='</div>';
  });
  h+='</div>';
  h+='<div style="font-size:11px;color:rgba(255,255,255,.32);line-height:1.7;">Probabilità implicita = <b style="color:rgba(255,255,255,.55);">1 ÷ quota</b>, normalizzata al 100%.</div>';
  h+='</div>';
  return h;
}

/* ═══ AFTER RENDER (event listeners & patches) ═════════════════ */
function afterRender(){
  document.querySelectorAll('img[data-tl]').forEach(function(img){
    img.onerror=function(){
      var tid=parseInt(this.dataset.tl),sz=parseInt(this.dataset.sz);
      var t=getTeam(tid);if(!t)return;
      var init=t.name.charAt(0).toUpperCase();
      var div=document.createElement('div');
      div.style.cssText='width:'+sz+'px;height:'+sz+'px;border-radius:50%;flex-shrink:0;background:'+t.color+'33;border:2px solid '+t.color+';display:inline-flex;align-items:center;justify-content:center;font-size:'+Math.round(sz*.38)+'px;color:'+t.color+';font-weight:900;vertical-align:middle;';
      div.textContent=init;
      this.parentNode.replaceChild(div,this);
    };
  });

  document.querySelectorAll('input[data-mid]').forEach(function(inp){
    inp.addEventListener('change',function(){
      var mid=parseInt(this.dataset.mid),fld=this.dataset.fld;
      var m=matches.find(function(x){return x.id===mid;});
      if(!m)return;
      m[fld]=this.value;
      m.played=['s1h','s1a','s2h','s2a'].every(function(f){return m[f]!==''&&!isNaN(+m[f]);});
      saveToDB();
    });
  });

  /* CONFIG ORARI (admin) */
  document.querySelectorAll('input[data-cfg]').forEach(function(inp){
    inp.addEventListener('change',function(){
      var k=this.dataset.cfg;
      if(k==='startTime') startTime=this.value||'18:00';
      if(k==='gapMin')    gapMin=Math.max(1,parseInt(this.value,10)||20);
      saveToDB();
      render();
    });
  });

  /* TASTO LOCK — tieni premuto ~0.8s per bloccare/sbloccare */
  var lb=document.getElementById('lockBtn');
  if(lb){
    var fill=document.getElementById('lockFill');
    var holdTimer=null, completed=false;
    var startHold=function(e){
      e.preventDefault();
      completed=false;
      if(fill){ fill.style.transition='width .8s linear'; fill.style.width='100%'; }
      holdTimer=setTimeout(function(){
        completed=true;
        locked=!locked;
        saveToDB();
        render();
      },800);
    };
    var endHold=function(){
      if(completed) return;
      if(holdTimer){ clearTimeout(holdTimer); holdTimer=null; }
      if(fill){ fill.style.transition='none'; fill.style.width='0'; }
    };
    lb.addEventListener('mousedown',startHold);
    lb.addEventListener('touchstart',startHold,{passive:false});
    lb.addEventListener('mouseup',endHold);
    lb.addEventListener('mouseleave',endHold);
    lb.addEventListener('touchend',endHold);
    lb.addEventListener('touchcancel',endHold);
  }

  /* Aggiorna i calcoli delle scommesse in tempo reale */
  function updateBetUI() {
    var c=document.getElementById('prob-chart');if(c)c.innerHTML=buildChart();
    var a=document.getElementById('bet-analysis');if(a)a.innerHTML=buildAnalysis();
    var totalPool = Object.values(bets).reduce(function(sum, val){ return sum + (parseFloat(val) || 0); }, 0);
    var tp=document.getElementById('tot-pool');if(tp)tp.textContent=totalPool+' 🍟';

    teams.forEach(function(t){
      var wEl=document.getElementById('win'+t.id);
      if(wEl){
        var b = parseFloat(bets[t.id]) || 0;
        var q = parseFloat(odds[t.id]) || 0;
        var win = (b * q).toFixed(1).replace('.0','');
        wEl.textContent = win > 0 ? win : '—';
      }
    });
  }

  /* LISTENER QUOTE (solo admin: gli input esistono solo in modalità admin) */
  document.querySelectorAll('input[data-oid]').forEach(function(inp){
    inp.addEventListener('change',function(){
      odds[parseInt(this.dataset.oid)]=this.value;
      updateBetUI();
      saveToDB();
    });
  });

  /* LISTENER PATATINE (solo admin) */
  document.querySelectorAll('input[data-bid]').forEach(function(inp){
    inp.addEventListener('change',function(){
      bets[parseInt(this.dataset.bid)]=this.value;
      updateBetUI();
      saveToDB();
    });
  });

  var li=document.getElementById('logo-inp');
  if(li){
    li.addEventListener('input',function(){logoInput=this.value;});
    li.addEventListener('keydown',function(e){if(e.key==='Enter')saveLogo(editLogo);});
    li.focus();var len=li.value.length;li.setSelectionRange(len,len);
  }

  var mi=document.getElementById('mem-inp');
  if(mi){
    mi.addEventListener('input',function(){memberInput=this.value;});
    mi.addEventListener('keydown',function(e){if(e.key==='Enter'&&editMember)saveMember(editMember.tid,editMember.idx);});
    mi.focus();var len=mi.value.length;mi.setSelectionRange(len,len);
  }
}

/* ═══ AZIONI SULLA UI (non salvano nel DB) ══════════════════════ */
function setTab(t)      {tab=t;openMatch=null;render();}
function toggleMatch(id){openMatch=openMatch===id?null:id;render();}
function toggleTeam(id) {openTeam=openTeam===id?null:id;editLogo=null;editMember=null;logoInput='';memberInput='';render();}
function startEditLogo(tid){editLogo=tid;logoInput=teams.find(function(t){return t.id===tid;}).logo;render();}

function startEditMember(tid,idx){
  var t=teams.find(function(x){return x.id===tid;});

  render();
}
function cancelMember(){editMember=null;memberInput='';render();}

/* ═══ AZIONI SUI DATI (salvano nel DB) ══════════════════════════ */
function doRandomize()  {
  if(locked){ alert('🔒 Il calendario è bloccato. Sblocca (tieni premuto il tasto LOCK) per poter randomizzare.'); return; }
  matches=shuffle(matches).map(function(m,i){return Object.assign({},m,{id:i+1});});
  saveToDB();
}
function saveLogo(tid) {
  teams=teams.map(function(t){return t.id===tid?Object.assign({},t,{logo:logoInput.trim()}):t;});
  editLogo=null; logoInput='';
  saveToDB();
}
function clearLogo(tid) {
  teams=teams.map(function(t){return t.id===tid?Object.assign({},t,{logo:''}):t;});
  saveToDB();
}
function saveMember(tid,idx){
  teams=teams.map(function(t){
    if(t.id!==tid)return t;
    var m=t.members.slice();m[idx]=memberInput.trim()||'TBD';
    return Object.assign({},t,{members:m});
  });
  editMember=null; memberInput='';
  saveToDB();
}
function removeMember(tid,idx){
  editMember=null; memberInput='';
  teams=teams.map(function(t){
    if(t.id!==tid)return t;
    return Object.assign({},t,{members:t.members.filter(function(_,i){return i!==idx;})});
  });
  saveToDB();
}
function addMember(tid){
  teams=teams.map(function(t){
    if(t.id!==tid)return t;
    return Object.assign({},t,{members:t.members.concat('TBD')});
  });
  saveToDB();
}

/* ═══ AVVIO ═════════════════════════════════════════════════════ */
render();
</script>
