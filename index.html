<style>
/* ================================================
   DESIGN TOKENS
================================================ */
:root {
  --sand:        #ebe2cd;
  --sand-light:  #f3ebd6;
  --sand-mid:    #dccfb1;
  --forest:      #1f2d1c;
  --forest-soft: #3a4d36;
  --forest-faint:#6a7853;
  --forest-ghost:rgba(31,45,28,.22);
  --moss:        #607d4d;
  --olive:       #87904e;
  --clay:        #b85a1f;
  --rust:        #8b3a1a;
  --water:       #4f7378;
  --gold:        #b88d1f;
  --stone:       #7a7466;
  --plum:        #6e4470;
  --bone:        #faf3e0;
  --serif: 'Fraunces','Georgia',serif;
  --mono:  'JetBrains Mono','Menlo',monospace;
  --r-sm:6px; --r-md:14px; --r-lg:24px; /* Aumentato border-radius per stile SiVola */
}

/* ================================================
   BASE
================================================ */
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--sand);color:var(--forest);font-family:var(--serif);min-height:100%;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.4;mix-blend-mode:multiply;
  background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 220 220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.18 0 0 0 0 0.11 0 0 0 0.16 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
::selection{background:var(--moss);color:var(--bone)}
[data-lucide],svg.lucide{stroke-width:1.6;stroke:currentColor;fill:none;display:inline-block;vertical-align:middle;flex-shrink:0}
.icon-xs{width:13px;height:13px} .icon-sm{width:16px;height:16px} .icon-md{width:20px;height:20px} .icon-lg{width:28px;height:28px} .icon-xl{width:40px;height:40px;stroke-width:1.3}

/* ================================================
   HEADER / NAV
================================================ */
.frame{background:var(--sand);border-bottom:1px solid var(--forest);position:sticky;top:0;z-index:200}
.frame-inner{max-width:1280px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:16px}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0;text-decoration:none}
.brand-logo{height:28px;width:auto;object-fit:contain} /* NUOVO LOGO */
.brand-name{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--forest);line-height:1}
.brand-name .dot{color:var(--clay)}
.brand-sub{font-family:var(--mono);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--forest-faint);margin-top:2px}
.nav{display:flex;gap:3px;flex:1;justify-content:center;min-width:0}
.nav-link{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--forest-soft);padding:7px 12px;border-radius:var(--r-sm);cursor:pointer;background:none;border:1px solid transparent;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;transition:.15s;flex-shrink:0}
.nav-link:hover{background:var(--sand-light);color:var(--forest)}
.nav-link.active{background:var(--forest);color:var(--bone);border-color:var(--forest)}
.nav-end{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--forest-ghost);flex-shrink:0}
.sync-dot.ok{background:var(--moss);animation:pulse 2s infinite}
.sync-dot.owner{background:var(--clay);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

main{max-width:1280px;margin:0 auto;padding:32px 28px 100px;position:relative;z-index:1}

/* ================================================
   BUTTONS
================================================ */
.btn{font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;padding:9px 16px;border:1px solid var(--forest);background:var(--sand);color:var(--forest);cursor:pointer;display:inline-flex;align-items:center;gap:8px;border-radius:var(--r-sm);transition:.15s;white-space:nowrap}
.btn:hover{background:var(--forest);color:var(--bone)}
.btn-primary{background:var(--moss);border-color:var(--moss);color:var(--bone)}
.btn-primary:hover{background:var(--forest-soft)}
.btn-clay{background:var(--clay);border-color:var(--clay);color:var(--bone)}
.btn-clay:hover{background:var(--rust)}
.btn-ghost{background:transparent;border-color:var(--forest-ghost);color:var(--forest-soft)}
.btn-ghost:hover{background:var(--sand-light);color:var(--forest)}
.btn-danger{background:transparent;border-color:var(--rust);color:var(--rust)}
.btn-danger:hover{background:var(--rust);color:var(--bone)}
.btn-sm{padding:5px 11px;font-size:9.5px}
.btn[disabled]{opacity:.5;cursor:not-allowed;pointer-events:none}

/* ================================================
   HOME
================================================ */
.home-hero{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;padding:24px 0 48px;border-bottom:1px solid var(--forest-ghost);margin-bottom:40px}
.home-hero h1{font-family:var(--serif);font-size:clamp(38px,6vw,80px);font-weight:400;line-height:.94;letter-spacing:-.035em;color:var(--forest);margin-bottom:16px}
.home-hero h1 em{font-style:italic;color:var(--clay)}
.home-hero p{font-size:16px;line-height:1.6;color:var(--forest-soft);max-width:520px;margin-bottom:24px}
.home-hero .btns{display:flex;gap:10px;flex-wrap:wrap}
.home-hero-img{width:100%;height:100%;max-height:480px;object-fit:cover;border-radius:var(--r-lg);box-shadow:0 12px 30px rgba(31,45,28,.08)} /* Immagine Hero affiancata */
.home-split{display:grid;grid-template-columns:1fr 1fr;gap:48px}
.home-section-title{font-family:var(--serif);font-weight:500;font-size:20px;letter-spacing:-.01em;text-transform:uppercase;color:var(--forest);margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid var(--forest);display:flex;align-items:center;justify-content:space-between}
.home-section-title .more{font-family:var(--mono);font-size:9px;letter-spacing:.16em;color:var(--forest-faint);cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-weight:500;transition:.15s}
.home-section-title .more:hover{color:var(--clay)}
.trip-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--forest-ghost);cursor:pointer;transition:.12s}
.trip-row:hover{padding-left:6px}
.trip-row:hover .trip-arrow{color:var(--clay);transform:translateX(3px)}
.trip-row-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.trip-row-info{flex:1;min-width:0}
.trip-row-title{font-family:var(--serif);font-weight:500;font-size:16px;color:var(--forest);text-transform:uppercase;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trip-row-meta{font-family:var(--mono);font-size:9.5px;color:var(--clay);letter-spacing:.04em;margin-top:2px;display:flex;align-items:center;gap:5px}
.trip-arrow{color:var(--forest-ghost);transition:.15s}
.status-badge{font-family:var(--mono);font-size:8px;letter-spacing:.16em;text-transform:uppercase;padding:2px 7px;border-radius:3px;flex-shrink:0}
.status-draft{background:var(--sand-mid);color:var(--forest-faint)}
.status-active{background:rgba(184,90,31,.15);color:var(--clay)}
.status-completed{background:rgba(96,125,77,.15);color:var(--moss)}
.status-filed{background:rgba(122,116,102,.15);color:var(--stone)}
.no-items{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--forest-faint);padding:20px 0}
.home-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--forest-ghost);border:1px solid var(--forest-ghost);border-radius:var(--r-md);overflow:hidden;margin-bottom:40px}
.stat-box{background:var(--sand);padding:16px 18px}
.stat-label{font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--forest-faint);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.stat-value{font-family:var(--serif);font-size:32px;font-weight:500;letter-spacing:-.025em;color:var(--forest);line-height:1}
.stat-value .unit{font-family:var(--mono);font-size:12px;color:var(--forest-faint);margin-left:3px}

/* ================================================
   SECTION HEADER
================================================ */
.sec-head{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:14px;border-bottom:2px solid var(--forest);margin-bottom:26px}
.sec-head h2{font-family:var(--serif);font-weight:500;font-size:24px;text-transform:uppercase;letter-spacing:-.01em;color:var(--forest)}
.sec-meta{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--forest-faint);text-transform:uppercase}

/* ================================================
   CARD GRID (SIVOLA INSPIRATION)
================================================ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;margin-bottom:32px}
.card{background:var(--bone);border:1px solid var(--forest-ghost);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;display:flex;flex-direction:column;transition:.2s ease;box-shadow:0 4px 12px rgba(31,45,28,.04)}
.card:hover{background:var(--bone);transform:translateY(-4px);box-shadow:0 12px 28px rgba(31,45,28,.12)}
.card-cover{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--forest-ghost);position:relative}
.card-body{padding:20px;flex:1;display:flex;flex-direction:column}
.card-tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--forest-faint);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:var(--serif);font-weight:600;font-size:22px;text-transform:uppercase;color:var(--forest);line-height:1.1;margin-bottom:6px;letter-spacing:-.015em}
.card-region{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--clay);margin-bottom:12px;display:inline-flex;align-items:center;gap:5px}
.card-desc{font-size:13.5px;line-height:1.5;color:var(--forest-soft);flex:1;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta-row{display:flex;gap:12px;flex-wrap:wrap;font-family:var(--mono);font-size:10px;color:var(--forest-faint);border-top:1px dashed var(--forest-ghost);padding-top:12px}
.card-meta-item{display:flex;align-items:center;gap:4px}
.card-add{background:transparent;border:2px dashed var(--forest-ghost);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:50px 20px;min-height:220px;cursor:pointer;transition:.18s;border-radius:var(--r-lg)}
.card-add:hover{border-color:var(--clay);color:var(--clay);background:var(--sand-light)}
.card-add-text{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--forest-faint)}
.card-add:hover .card-add-text{color:var(--clay)}

/* ================================================
   SHOP SCROLLER (HOME)
================================================ */
.shop-scroller{display:flex;gap:16px;overflow-x:auto;padding-bottom:20px;scroll-snap-type:x mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.shop-scroller::-webkit-scrollbar{display:none;}
.shop-scroller .product-card{min-width:260px;max-width:280px;scroll-snap-align:start;}

/* ================================================
   DETAIL VIEW
================================================ */
.back-btn{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--forest-soft);background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:7px;margin-bottom:20px;padding:0;transition:.15s}
.back-btn:hover{color:var(--clay)}
.detail-hero{aspect-ratio:21/9;max-height:340px;background:var(--sand-mid);border:1px solid var(--forest-ghost);border-radius:var(--r-md);overflow:hidden;margin-bottom:24px;display:flex;align-items:center;justify-content:center;color:var(--forest-faint)}
.detail-hero img{width:100%;height:100%;object-fit:cover}
.detail-title-row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:8px}
.detail-title-row h1{font-family:var(--serif);font-weight:500;font-size:clamp(32px,5vw,60px);text-transform:uppercase;color:var(--forest);letter-spacing:-.03em;line-height:.95;flex:1}
.detail-title-row .actions{display:flex;gap:8px;flex-shrink:0;padding-top:6px}
.detail-meta{font-family:var(--mono);font-size:11px;color:var(--clay);margin-bottom:20px;display:flex;gap:16px;flex-wrap:wrap;letter-spacing:.05em}
.detail-meta span{display:inline-flex;align-items:center;gap:5px}
.detail-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:1px;background:var(--forest-ghost);border:1px solid var(--forest-ghost);border-radius:var(--r-md);overflow:hidden;margin-bottom:28px}
.d-stat{background:var(--sand);padding:12px 16px}
.d-stat-label{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--forest-faint);margin-bottom:4px}
.d-stat-value{font-family:var(--serif);font-size:20px;font-weight:500;color:var(--forest);letter-spacing:-.02em}
.auto-tag{font-family:var(--mono);font-size:7.5px;letter-spacing:.12em;background:var(--moss);color:var(--bone);padding:1px 5px;border-radius:2px;vertical-align:middle;margin-left:4px}

/* ================================================
   STAGES (detail view)
================================================ */
.stages{display:flex;flex-direction:column}
.stage-item{display:grid;grid-template-columns:88px 1fr;gap:18px;padding:20px 0;border-bottom:1px solid var(--forest-ghost)}
.stage-item:first-child{border-top:1px solid var(--forest-ghost)}
.stage-num-col{display:flex;flex-direction:column;align-items:flex-start}
.stage-big-num{font-family:var(--serif);font-size:56px;font-weight:400;line-height:.85;color:rgba(31,45,28,.18);letter-spacing:-.04em}
.stage-date-big{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--clay);line-height:1;margin-bottom:2px}
.stage-day-small{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--forest-faint);margin-top:4px}
.stage-content{min-width:0}
.stage-top-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.stage-name-large{font-family:var(--serif);font-weight:500;font-size:19px;text-transform:uppercase;color:var(--forest);letter-spacing:-.01em;line-height:1.1}
.stage-type-pill{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:4px 9px;border-radius:var(--r-sm);border:1px solid;flex-shrink:0}
.type-travel  {color:var(--forest);border-color:var(--forest);background:rgba(31,45,28,.06)}
.type-relax   {color:var(--moss);border-color:var(--moss);background:rgba(96,125,77,.08)}
.type-beach   {color:var(--gold);border-color:var(--gold);background:rgba(184,141,31,.08)}
.type-viewpoint{color:var(--water);border-color:var(--water);background:rgba(79,115,120,.08)}
.type-adventure{color:var(--clay);border-color:var(--clay);background:rgba(184,90,31,.07)}
.type-activity{color:var(--olive);border-color:var(--olive);background:rgba(135,144,78,.08)}
.type-evening {color:var(--plum);border-color:var(--plum);background:rgba(110,68,112,.08)}
.type-exploration{color:var(--olive);border-color:var(--olive);background:rgba(135,144,78,.08)}
.type-history {color:var(--stone);border-color:var(--stone);background:rgba(122,116,102,.08)}
.type-food    {color:var(--clay);border-color:var(--clay);background:rgba(184,90,31,.07)}
.stage-info-row{font-family:var(--mono);font-size:10px;color:var(--forest-faint);display:flex;gap:14px;flex-wrap:wrap;margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase}
.stage-info-row strong{color:var(--forest)}
.stage-notes-text{font-size:13.5px;line-height:1.55;color:var(--forest-soft);margin-top:6px}

/* ================================================
   MAP
================================================ */
#map-wrap{height:400px;border:1px solid var(--forest);border-radius:var(--r-md);margin-top:24px;overflow:hidden;position:relative}
#map-wrap .leaflet-container{height:100%;background:#e6dfc7}
.map-tile-sw{position:absolute;top:10px;right:10px;z-index:500;display:flex;background:var(--sand);border:1px solid var(--forest);border-radius:var(--r-sm);overflow:hidden}
.map-tile-sw button{background:transparent;border:none;padding:6px 10px;font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;color:var(--forest-soft);border-right:1px solid var(--forest-ghost)}
.map-tile-sw button:last-child{border-right:none}
.map-tile-sw button.active{background:var(--forest);color:var(--bone)}
.map-marker{width:34px;height:34px;border-radius:50%;background:var(--forest);color:var(--bone);border:2px solid var(--bone);box-shadow:0 2px 8px rgba(31,45,28,.4);display:flex!important;align-items:center;justify-content:center;font-family:var(--serif);font-weight:600;font-size:13px}
.map-marker.is-travel{background:var(--forest-soft)}
.map-marker.is-activity{background:var(--olive)}
.leaflet-popup-content-wrapper{background:var(--sand);border:1px solid var(--forest);border-radius:var(--r-md);box-shadow:4px 4px 0 rgba(31,45,28,.15)}
.leaflet-popup-tip{background:var(--forest)}
.leaflet-popup-content{font-family:var(--serif);font-size:13.5px;color:var(--forest);margin:10px 14px}
.map-empty{height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:var(--sand-light);border:1.5px dashed var(--forest-ghost);border-radius:var(--r-md);color:var(--forest-faint);font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-align:center;padding:20px}

/* ================================================
   SHOP (HIGH HOPE INSPIRATION)
================================================ */
.shop-banner{display:grid;grid-template-columns:1.3fr 1fr;gap:40px;align-items:center;padding:36px 0 32px;border-bottom:1px solid var(--forest-ghost);margin-bottom:36px}
.shop-banner h1{font-family:var(--serif);font-size:clamp(34px,5.5vw,72px);font-weight:400;line-height:.9;letter-spacing:-.035em;margin-bottom:14px}
.shop-banner h1 em{font-style:italic;color:var(--clay)}
.shop-banner p{font-size:15px;line-height:1.6;color:var(--forest-soft);max-width:440px}
.shop-how{background:var(--sand-mid);border:1px solid var(--forest-ghost);border-radius:var(--r-md);padding:20px}
.shop-how-title{font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--clay);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.shop-how-steps{list-style:none;display:flex;flex-direction:column;gap:7px}
.shop-how-steps li{font-family:var(--serif);font-size:13.5px;color:var(--forest-soft);display:flex;align-items:flex-start;gap:8px;line-height:1.4}
.shop-how-steps li::before{content:'→';color:var(--clay);flex-shrink:0;margin-top:1px;font-family:var(--mono)}
.shop-filters{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.shop-filter-label{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--forest-faint);margin-right:4px}
.shop-filter-btn{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;padding:6px 12px;background:transparent;border:1px solid var(--forest-ghost);color:var(--forest-soft);cursor:pointer;border-radius:var(--r-sm);transition:.12s}
.shop-filter-btn:hover{background:var(--sand-light)}
.shop-filter-btn.active{background:var(--forest);color:var(--bone);border-color:var(--forest)}

<script>
/* ================================================
   GLOBAL DATA: PRODUCTS
================================================ */
const PRODUCTS=[
  {id:'ts-classic',type:'T-Shirt',name:"Baito · Classic",desc:"Girocollo, 100% cotone organico pesante. Logo ricamato sul petto sinistro, scritta sul retro.",price:25,colors:['#1f2d1c','#ebe2cd','#b85a1f'],sizes:['S','M','L','XL','XXL'],available:true,tone:'#1f2d1c'},
  {id:'ts-wild',type:'T-Shirt',name:"Into the Wild",desc:"Scritta bold sulla schiena. Minimal come le strade che percorriamo. 100% cotone.",price:25,colors:['#1f2d1c','#607d4d'],sizes:['S','M','L','XL'],available:true,tone:'#607d4d'},
  {id:'fw-hoodie',type:'Felpa',name:"Baito dell'Orso · Hoodie",desc:"Felpa con cappuccio, cotone felpato 400g. Per le serate in quota e le mattine fredde.",price:45,colors:['#1f2d1c','#7a7466'],sizes:['S','M','L','XL','XXL'],available:true,tone:'#3a4d36'},
  {id:'ts-cielo',type:'T-Shirt',name:"Mai sotto un cielo",desc:"Il motto del quaderno. Stampa grafica sul retro. Edizione limitata.",price:28,colors:['#ebe2cd','#1f2d1c'],sizes:['S','M','L','XL'],available:true,tone:'#7a7466'},
  {id:'fw-crew',type:'Felpa',name:"Rotta Aperta · 2026",desc:"Felpa girocollo, edizione 2026. Logo ricamato. In lavorazione.",price:48,colors:['#b85a1f','#1f2d1c'],sizes:['S','M','L','XL'],available:false,tone:'#b85a1f'},
  {id:'cap-orso',type:'Cappellino',name:"Baito · Cap",desc:"5 pannelli, regolabile. Ricamo logo frontale. Compagno fedele.",price:20,colors:['#1f2d1c','#607d4d','#ebe2cd'],sizes:['Unica'],available:true,tone:'#6a7853'}
];

/* ================================================
   STATE
================================================ */
const S = {
  itins: [], pts: [], route: { name:'home', id:null },
  maps: {}, tile: 'topo',
  cloud: { user:null, owner:false, synced:false },
  shopFilter: 'all'
};

/* ================================================
   FIREBASE
================================================ */
let fbReady = false;
function initFirebase() {
  if (!window.__firebase) return;
  fbReady = true;
  const fb = window.__firebase;
  fb.onAuthStateChanged(fb.auth, async user => {
    S.cloud.user = user;
    S.cloud.owner = user && user.uid === window.__OWNER_UID;
    updateAuthUI();
    if (user) {
      await cloudLoad();
      cloudListen();
    }
    render();
  });
}
async function cloudLoad() {
  if (!window.__firebase) return;
  const fb = window.__firebase;
  const snap = await fb.getDoc(fb.doc(fb.db,'public_data','shared_base'));
  if (snap.exists()) {
    const d = snap.data();
    if (Array.isArray(d.itineraries)) S.itins = d.itineraries;
    if (Array.isArray(d.points)) S.pts = d.points;
    local('save');
    S.cloud.synced = true; updateSyncDot(); render();
  } else if (S.cloud.owner) {
    await cloudSave();
  }
}
function cloudListen() {
  if (!window.__firebase) return;
  const fb = window.__firebase;
  fb.onSnapshot(fb.doc(fb.db,'public_data','shared_base'), snap => {
    if (!snap.exists()) return;
    const d = snap.data();
    const ni = JSON.stringify(d.itineraries||[]), ci = JSON.stringify(S.itins);
    if (ni !== ci || JSON.stringify(d.points||[]) !== JSON.stringify(S.pts)) {
      if (Array.isArray(d.itineraries)) S.itins = d.itineraries;
      if (Array.isArray(d.points)) S.pts = d.points;
      local('save'); render();
    }
    S.cloud.synced = true; updateSyncDot();
  });
}
async function cloudSave() {
  if (!window.__firebase || !S.cloud.owner) return;
  const fb = window.__firebase;
  await fb.setDoc(fb.doc(fb.db,'public_data','shared_base'), {
    itineraries: S.itins, points: S.pts, updatedAt: fb.serverTimestamp()
  }, {merge:true});
  S.cloud.synced = true; updateSyncDot();
}
async function toggleAuth() {
  if (!window.__firebase) return;
  const fb = window.__firebase;
  if (S.cloud.user) { await fb.signOut(fb.auth); toast('Logout'); }
  else { try { await fb.signInWithPopup(fb.auth, fb.provider); } catch(e){} }
}
function updateAuthUI() {
  const btn = document.getElementById('auth-btn');
  if (!fbReady) { btn.style.display='none'; return; }
  btn.style.display = 'inline-flex';
  btn.textContent = S.cloud.user ? 'Esci' : 'Login';
}
function updateSyncDot() {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (S.cloud.owner ? ' owner' : (S.cloud.synced ? ' ok' : ''));
}

/* ================================================
   LOCAL STORAGE
================================================ */
function local(cmd) {
  if (cmd === 'load') {
    S.itins = JSON.parse(localStorage.getItem('baito_v2_itins') || '[]');
    S.pts   = JSON.parse(localStorage.getItem('baito_v2_pts')   || '[]');
  } else {
    localStorage.setItem('baito_v2_itins', JSON.stringify(S.itins));
    localStorage.setItem('baito_v2_pts',   JSON.stringify(S.pts));
  }
}
async function persist() {
  local('save');
  if (S.cloud.owner) await cloudSave();
}

/* ================================================
   UTILITIES
================================================ */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove('show'), 2000);
}
function esc(s) { if(s==null)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function nl2br(s) { return esc(s).replace(/\n/g,'<br>'); }
function fmtDate(iso) { if(!iso)return'—'; try{return new Date(iso).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase();}catch{return'—';} }
function ri() { requestAnimationFrame(()=>{ if(window.lucide)window.lucide.createIcons(); }); }

/* ================================================
   PARSE COORDS
================================================ */
function parseCoords(s) {
  if (!s || typeof s !== 'string') return null;
  s = s.trim();
  const url = s.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
  if (url) return [+url[1], +url[2]];
  const dec = s.match(/^(-?\d+(?:\.\d+)?)\s*[,;\s]+(-?\d+(?:\.\d+)?)$/);
  if (dec) { const la=+dec[1],lo=+dec[2]; if(Math.abs(la)<=90&&Math.abs(lo)<=180)return[la,lo]; }
  const dms = s.match(/(\d+(?:\.\d+)?)[°]\s*(?:(\d+(?:\.\d+)?)['\u2032]?\s*)?(?:(\d+(?:\.\d+)?)["\u2033]?\s*)?([NSns])\s*[\s\u00B7,;]+\s*(\d+(?:\.\d+)?)[°]\s*(?:(\d+(?:\.\d+)?)['\u2032]?\s*)?(?:(\d+(?:\.\d+)?)["\u2033]?\s*)?([EWew])/);
  if (dms) {
    const la=(+dms[1]+(+dms[2]||0)/60+(+dms[3]||0)/3600)*(/s/i.test(dms[4])?-1:1);
    const lo=(+dms[5]+(+dms[6]||0)/60+(+dms[7]||0)/3600)*(/w/i.test(dms[8])?-1:1);
    if(!isNaN(la)&&!isNaN(lo))return[la,lo];
  }
  return null;
}

/* ================================================
   MAPS
================================================ */
const TILES = {
  topo:{ url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', attr:'© Esri' },
  sat: { url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', attr:'© Esri Imagery' }
};
function destroyMap(id) { if(S.maps[id]){try{S.maps[id].remove();}catch(e){}delete S.maps[id];} }
function initMap(id, markers, opts={}) {
  if(typeof L==='undefined')return;
  destroyMap(id);
  const el = document.getElementById(id);
  if (!el) return;
  const valid = markers.filter(m=>m.coords);
  if (!valid.length) {
    el.innerHTML = `<div class="map-empty"><i data-lucide="map-off" class="icon-lg"></i><div>Nessuna coordinata disponibile.</div><div style="font-size:9px;margin-top:4px">Inserisci le coordinate in formato: 46.12, 11.45</div></div>`;
    ri(); return;
  }
  const map = L.map(id, {zoomControl:true,scrollWheelZoom:false});
  map.on('click',()=>map.scrollWheelZoom.enable());
  map.on('mouseout',()=>map.scrollWheelZoom.disable());
  const tileLayers = {
    topo: L.tileLayer(TILES.topo.url,{maxZoom:19,attribution:TILES.topo.attr}),
    sat:  L.tileLayer(TILES.sat.url, {maxZoom:19,attribution:TILES.sat.attr})
  };
  tileLayers[S.tile].addTo(map);
  S.maps[id] = map; S.maps[id]._tl = tileLayers; S.maps[id]._at = S.tile;
  const lls = [];
  valid.forEach((m,i) => {
    const cls = 'map-marker is-'+(m.type||'travel');
    const lbl = opts.isPoint ? '★' : String(i+1).padStart(2,'0');
    const icon = L.divIcon({className:'',html:`<div class="${cls}">${lbl}</div>`,iconSize:[34,34],iconAnchor:[17,17]});
    const mk = L.marker(m.coords, {icon}).addTo(map);
    if (m.popup) mk.bindPopup(m.popup);
    lls.push(m.coords);
  });
  if (opts.connect && lls.length>1) L.polyline(lls,{color:'#1f2d1c',weight:2,opacity:.6,dashArray:'6,6'}).addTo(map);
  lls.length===1 ? map.setView(lls[0],11) : map.fitBounds(lls,{padding:[40,40],maxZoom:13});
}
function switchTile(mapId, t) {
  const map = S.maps[mapId]; if(!map)return;
  map.removeLayer(map._tl[map._at]);
  map._tl[t].addTo(map); map._at=t; S.tile=t;
  document.querySelectorAll(`[data-map="${mapId}"] button`).forEach(b=>b.classList.toggle('active',b.dataset.tile===t));
}

function removeStage(sid){ const a=document.querySelector(`.stage-acc[data-id="${sid}"]`); if(a&&confirm('Eliminare questa tappa?')){a.remove();autoCalc();reNumberStages();} }

function collectStages(){
  return Array.from(document.querySelectorAll('.stage-acc')).map((a,i)=>{
    const t=a.dataset.type||'travel',isT=t==='travel';
    return {
      id: a.dataset.id||uid(), day: parseInt(a.querySelector('.s-day')?.value)||i+1,
      stageDate: a.querySelector('.s-date')?.value||'', type: t, travelMode: a.dataset.mode||'car',
      fromPlace: isT?(a.querySelector('.s-from')?.value||''):'', toPlace: isT?(a.querySelector('.s-to')?.value||''):'',
      distance: isT?(a.querySelector('.s-distance')?.value||''):'', hours: isT?(a.querySelector('.s-hours')?.value||''):'',
      cost: isT?(a.querySelector('.s-cost')?.value||''):'', name: !isT?(a.querySelector('.s-name')?.value||''):'',
      timeSlot: !isT?(a.querySelector('.s-timeslot')?.value||''):'', duration: !isT?(a.querySelector('.s-duration')?.value||''):'',
      coords: a.querySelector('.s-coords')?.value||'', notes: a.querySelector('.s-notes')?.value||''
    };
  });
}

function calcTotals(stops){
  let km=0,min=0,cost=0,hk=false,hh=false,hc=false;
  (stops||[]).forEach(s=>{
    if(s.type==='travel'){
      if(s.distance){const m=s.distance.match(/[\d.,]+/);if(m){km+=parseFloat(m[0].replace(',','.'))||0;hk=true;}}
      if(s.hours){ const mh=s.hours.match(/(\d+):(\d+)/); if(mh){min+=parseInt(mh[1])*60+parseInt(mh[2]);hh=true;} else{const m2=s.hours.match(/[\d.,]+/);if(m2){min+=parseFloat(m2[0].replace(',','.'))*60||0;hh=true;}} }
      if(s.cost){const m=s.cost.match(/[\d.,]+/);if(m){cost+=parseFloat(m[0].replace(',','.'))||0;hc=true;}}
    }
  });
  const h=Math.floor(min/60),m=Math.round(min%60);
  return{km,hoursStr:m>0?`${h}h ${m}m`:`${h}h`,cost,hasKm:hk,hasHours:hh,hasCost:hc};
}
function totalAllKm(){
  let s=0; S.itins.forEach(it=>{ const t=calcTotals(it.stops); if(t.hasKm)s+=t.km; else if(it.distance){const m=it.distance.match(/[\d.,]+/);if(m)s+=parseFloat(m[0].replace(',','.'))||0;} }); return Math.round(s);
}

function toneFor(type){return{travel:'#3a4d36',relax:'#607d4d',beach:'#b88d1f',viewpoint:'#4f7378',adventure:'#b85a1f',activity:'#87904e',evening:'#6e4470',exploration:'#87904e',history:'#7a7466',food:'#b85a1f'}[type]||'#6a7853';}

}

function openModal(html){ document.getElementById('modal').innerHTML=html; document.getElementById('modal-back').classList.add('open'); document.body.style.overflow='hidden'; document.getElementById('modal-back').onclick=e=>{if(e.target===document.getElementById('modal-back'))closeModal();}; document.addEventListener('keydown',escKey); ri(); }
function closeModal(){ document.getElementById('modal-back').classList.remove('open'); document.body.style.overflow=''; document.removeEventListener('keydown',escKey); }
function escKey(e){if(e.key==='Escape')closeModal();}

function addStage(){ const list=document.getElementById('stages-list'); if(!list)return; const emp=list.querySelector('.stages-empty');if(emp)emp.remove(); const count=list.querySelectorAll('.stage-acc').length; const s={id:uid(),day:count+1,stageDate:'',type:'travel',travelMode:'car',fromPlace:'',toPlace:'',distance:'',hours:'',cost:'',name:'',timeSlot:'',duration:'',coords:'',notes:''}; const div=document.createElement('div'); div.innerHTML=stageAccHtml(s,count); list.appendChild(div.firstElementChild); ri(); setTimeout(()=>scrollModalBottom(),50); }
async function saveItin(id){ const title=document.getElementById('i-title')?.value.trim(); if(!title){toast('Manca il titolo');document.getElementById('i-title').focus();return;} const itin={ id, title, region:document.getElementById('i-region')?.value.trim()||'', status:document.getElementById('i-status')?.value||'draft', season:document.getElementById('i-season')?.value.trim()||'', terrain:document.getElementById('i-terrain')?.value.trim()||'', distance:document.getElementById('itin-distance')?.value.trim()||'', duration:document.getElementById('itin-duration')?.value.trim()||'', description:document.getElementById('i-desc')?.value||'', stops:collectStages(), dateAdded:S.itins.find(x=>x.id===id)?.dateAdded||new Date().toISOString() }; const idx=S.itins.findIndex(x=>x.id===id); if(idx>=0)S.itins[idx]=itin;else S.itins.unshift(itin); await persist(); closeModal();toast('Viaggio salvato!'); if(S.route.name==='itinerary')renderItinerary(document.getElementById('app'),id); else render(); }
async function deleteItin(id){ if(!confirm('Eliminare questo itinerario?'))return; S.itins=S.itins.filter(x=>x.id!==id); await persist();closeModal();toast('Eliminato.');goto('viaggiare'); }

  </div>`);
}

function addBP(){ const list=document.getElementById('bp-list');if(!list)return; const id=uid(),count=list.querySelectorAll('[data-bp-id]').length; const div=document.createElement('div'); div.innerHTML=`<div class="stage-acc open" data-bp-id="${id}" style="background:var(--sand);border:1px solid var(--forest-ghost)"><div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px dashed var(--forest-ghost)"><span style="font-family:var(--mono);font-size:10px;color:var(--clay);font-weight:700">BP ${String(count+1).padStart(2,'0')}</span><span style="flex:1;font-style:italic;font-size:13px;color:var(--forest-ghost)">Nuovo punto</span><button type="button" class="stage-acc-del" onclick="removeBP('${id}')"><i data-lucide="x" class="icon-xs"></i></button></div><div style="padding:10px"><div class="field-row"><div class="field" style="margin-bottom:8px"><label>Nome</label><input type="text" class="bp-name"></div><div class="field" style="margin-bottom:8px"><label>Distanza</label><input type="text" class="bp-dist"></div></div><div class="field-row"><div class="field" style="margin-bottom:8px"><label>Tipo</label><select class="bp-type"><option value="food">Cibo</option><option value="viewpoint">Panorama</option><option value="beach">Spiaggia</option><option value="activity">Attività</option><option value="evening">Serata</option><option value="relax">Relax</option><option value="history">Storia</option></select></div><div class="field" style="margin-bottom:8px"><label>Note</label><input type="text" class="bp-notes"></div></div></div></div>`; list.appendChild(div.firstElementChild);ri(); }
function removeBP(id){const el=document.querySelector(`[data-bp-id="${id}"]`);if(el)el.remove();}
async function savePt(id){ const title=document.getElementById('p-title')?.value.trim(); if(!title){toast('Manca il titolo');document.getElementById('p-title').focus();return;} const bps=Array.from(document.querySelectorAll('[data-bp-id]')).map(el=>({ id:el.dataset.bpId, name:el.querySelector('.bp-name')?.value.trim()||'', type:el.querySelector('.bp-type')?.value||'food', distance:el.querySelector('.bp-dist')?.value.trim()||'', notes:el.querySelector('.bp-notes')?.value.trim()||'' })); const pt={id,title,region:document.getElementById('p-region')?.value.trim()||'',coords:document.getElementById('p-coords')?.value.trim()||'',description:document.getElementById('p-desc')?.value||'',bestPoints:bps,dateAdded:S.pts.find(x=>x.id===id)?.dateAdded||new Date().toISOString()}; const idx=S.pts.findIndex(x=>x.id===id); if(idx>=0)S.pts[idx]=pt;else S.pts.unshift(pt); await persist();closeModal();toast('Punto salvato!');render(); }
async function deletePt(id){ if(!confirm('Eliminare questo punto?'))return; S.pts=S.pts.filter(x=>x.id!==id); await persist();closeModal();toast('Eliminato.');goto('viaggiare'); }

/* ================================================
   SEED DATA
================================================ */
function seedIfEmpty(){
  if(S.itins.length>0||S.pts.length>0)return;
  // Inserimento default invariato...
  local('save');
}

/* ================================================
   BOOT
================================================ */
document.addEventListener('DOMContentLoaded', async () => {
  local('load');
  seedIfEmpty();
  S.route = parseHash();
  render();
  initFirebase();
});

// Global exports
Object.assign(window,{
  goto, closeModal, toggleAcc, pickType, pickMode, pickTimeSlot:()=>{},
  openAllAcc, closeAllAcc, addStage, removeStage, reNumberStages,
  openItinModal, saveItin, deleteItin,
  openPointModal, savePt, deletePt, addBP, removeBP,
  autoCalc, resetAutoCalc, scrollModalBottom,
  setShopFilter, switchTile, toggleAuth,
  toast
});
</script>
